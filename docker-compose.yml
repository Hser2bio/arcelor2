services:
  ubuntu-desktop:
    build: ./ubuntu-rdp
    container_name: ubuntu-desktop
    ports:
      - "3389:3389"
    restart: unless-stopped

  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    depends_on:
      - guacd
    environment:
      - GUACD_HOSTNAME=guacd
    volumes:
      - ./guac-config:/etc/guacamole
    ports:
      - "8080:8080"

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
